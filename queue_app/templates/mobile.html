<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Ticket Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
        .font-digital { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-gray-200 flex justify-center font-sans m-0">

    <div class="w-full max-w-md bg-gray-50 min-h-screen shadow-2xl relative flex flex-col overflow-hidden">

        <div class="bg-slate-900 text-white px-4 py-4 flex items-center gap-3 shadow-md z-10">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
            <h1 class="text-lg font-bold tracking-wide">Ticket Monitoring</h1>
        </div>

        <div class="bg-teal-500 text-white rounded-xl p-4 mx-4 mt-5 shadow-sm">
            <div class="flex items-center gap-2 mb-2">
                <h3 class="font-bold text-sm">Notifikasi Aktif!</h3>
            </div>
            <ul class="text-xs space-y-1 ml-4 list-disc opacity-90">
                <li>Pantau antrean tanpa batas waktu</li>
                <li>Notifikasi otomatis saat giliran Anda tiba</li>
            </ul>
        </div>

        <div class="bg-slate-900 rounded-2xl mx-4 mt-5 p-5 shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20"></div>

            <div class="flex justify-between items-start mb-4 relative z-10">
                <div>
                    <h2 class="font-bold text-xl text-white">Pengunjung</h2>
                    <p class="text-xs text-slate-300 mt-1">Nomor Antrean Saya</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-300 uppercase tracking-wider">Loket Saya</p>
                    <p class="text-lg font-bold text-white">1</p>
                </div>
            </div>

            <div class="bg-white rounded-xl p-3 flex items-center justify-between mb-4 relative z-10 shadow-inner">
                <div class="flex-1 text-center">
                    <h1 id="my-number" class="text-5xl font-bold text-slate-900 font-digital tracking-tight">--</h1>
                </div>
                <div id="qr-container" class="w-16 h-16 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 text-[10px] text-gray-400 font-medium overflow-hidden">
                    <span id="qr-placeholder">Belum ada</span>
                </div>
            </div>

            <div class="bg-slate-800 rounded-lg py-2 text-center text-xs text-slate-300 relative z-10">
                Kode Unik: <span id="kode-unik" class="text-white font-bold ml-1 tracking-widest">-</span>
            </div>
        </div>

        <div class="mx-5 mt-4" id="area-tombol-ambil">
            <button id="btn-ambil-tiket" onclick="ambilAntreanSaya()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition active:scale-95">
                👇 AMBIL TIKET SAYA
            </button>
        </div>

        <div class="mx-5 mt-6 mb-6">
            <h3 class="font-bold text-gray-800 text-lg mb-1">Informasi Antrean Live</h3>
            <p class="text-xs text-gray-500 mb-4">Waktu Operasional: 10:00 - 23:59</p>

            <div class="border-t border-b border-gray-200 py-4 flex justify-between items-center">
                <div class="w-1/2 border-r border-gray-200 pr-4">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Terakhir Dilayani</p>
                    <p id="current-served" class="text-4xl font-bold text-slate-900 font-digital">000</p>
                </div>
                <div class="w-1/2 pl-4 text-right">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Menunggu</p>
                    <p id="waiting-count" class="text-4xl font-bold text-blue-600 font-digital">0</p>
                </div>
            </div>
        </div>

    </div>

    <script>

        // Sekarang dia akan otomatis menyesuaikan diri! (Entah itu Localhost, IP WiFi, atau Ngrok)
        const API_BASE_URL = window.location.origin + '/api';

        const currentServedEl = document.getElementById('current-served'); 
        const waitingCountEl = document.getElementById('waiting-count');
        const myNumberEl = document.getElementById('my-number');
        const kodeUnikEl = document.getElementById('kode-unik');
        const qrContainerEl = document.getElementById('qr-container');
        const btnAmbilEl = document.getElementById('btn-ambil-tiket');
        const areaTombolAmbil = document.getElementById('area-tombol-ambil');

        function formatNumber(num) { return num.toString().padStart(3, '0'); }

        // BACA URL
        const urlParams = new URLSearchParams(window.location.search);
        const tiketBawaanNomor = urlParams.get('nomor');
        const tiketBawaanKode = urlParams.get('kode');

        if (tiketBawaanNomor && tiketBawaanKode) {
            myNumberEl.innerText = tiketBawaanNomor;
            kodeUnikEl.innerText = tiketBawaanKode;

            const isiDataQR = `TIKET-${tiketBawaanNomor}-${tiketBawaanKode}`;
            const urlGambarQR = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${isiDataQR}`;
            qrContainerEl.innerHTML = `<img src="${urlGambarQR}" class="w-full h-full object-cover">`;
            
            if(areaTombolAmbil) areaTombolAmbil.style.display = 'none'; 
        }

        async function ambilAntreanSaya() {
            try {
                const response = await fetch(`${API_BASE_URL}/antrean/ambil/`, { method: 'POST' });
                if (response.ok) {
                    const statusRes = await fetch(`${API_BASE_URL}/antrean/status/`);
                    const data = await statusRes.json();
                    
                    const nomorSaya = formatNumber(data.antrean_sekarang + data.sisa_menunggu);
                    
                    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                    let kodeUnik = '';
                    for (let i = 0; i < 7; i++) kodeUnik += chars.charAt(Math.floor(Math.random() * chars.length));
                    
                    myNumberEl.innerText = nomorSaya;
                    kodeUnikEl.innerText = kodeUnik;
                    
                    const isiDataQR = `TIKET-${nomorSaya}-${kodeUnik}`;
                    const urlGambarQR = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${isiDataQR}`;
                    qrContainerEl.innerHTML = `<img src="${urlGambarQR}" class="w-full h-full object-cover">`;

                    btnAmbilEl.innerText = "✅ Tiket Berhasil Diambil";
                    btnAmbilEl.classList.replace('bg-blue-600', 'bg-green-600');
                    btnAmbilEl.disabled = true;
                    fetchStatus();
                }
            } catch (err) { alert("Server Django mati."); }
        }

        async function fetchStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/antrean/status/`);
                if (response.ok) {
                    const data = await response.json();
                    if (currentServedEl) currentServedEl.innerText = formatNumber(data.antrean_sekarang);
                    if (waitingCountEl) waitingCountEl.innerText = data.sisa_menunggu;
                }
            } catch (err) {}
        }

        fetchStatus();
        setInterval(fetchStatus, 1000); 
    </script>
</body>
</html>
